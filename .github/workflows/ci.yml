name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (against MSW)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Performance budget (initial route JS < 200KB)
        run: pnpm perf:budget

  infra:
    name: Infra (CDK typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: infra/pnpm-lock.yaml

      - name: Install
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: infra
        run: pnpm typecheck

  # Skeleton deploy: build image → push to ECR → cdk deploy provisions the stack.
  # The ECS service uses a CodeDeploy blue-green controller, so the app rollout (new
  # image → traffic shift) is driven by CodeDeploy, not by this cdk deploy alone.
  # Opt-in: set repo variable DEPLOY_ENABLED=true and the AWS_* secrets/vars.
  deploy-staging:
    name: Deploy (staging ECS)
    needs: quality
    if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:staging" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:staging"

      - name: Deploy CDK stack
        working-directory: infra
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          pnpm install
          pnpm cdk deploy --require-approval never
